name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(find /Applications -maxdepth 1 -name "Xcode*.app" -type d | sort -V | tail -1)
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          swift --version

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test --parallel

      - name: Bundle app
        run: |
          mkdir -p KeepAwake.app/Contents/MacOS KeepAwake.app/Contents/Resources
          cp .build/release/KeepAwake KeepAwake.app/Contents/MacOS/
          cp Sources/KeepAwake/Resources/Info.plist KeepAwake.app/Contents/
          cp Icon.icns KeepAwake.app/Contents/Resources/AppIcon.icns 2>/dev/null || true
          codesign --force --deep --sign - KeepAwake.app

      - name: Upload artifact
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4
        with:
          name: KeepAwake.app
          path: KeepAwake.app
